security:
    enable_authenticator_manager: true  # Nécessaire pour Symfony 5.4+
    
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\Utilisateur:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email
        oauth:
            id: App\Security\GoogleUserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider

            custom_authenticator: App\Security\LoginFormAuthenticator

            
            # Configuration de la déconnexion
            logout:
                path: app_logout                   # Nom de la route
                target: app_home                   # Redirection après logout
            
            # Option "Se souvenir de moi"
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800                   # 1 semaine en secondes
                path: /
                always_remember_me: false
                remember_me_parameter: _remember_me



    access_control:
        # Pages publiques (accessibles sans connexion)
        - { path: ^/login$, roles: PUBLIC_ACCESS, methods: [GET, POST] }
        - { path: ^/signup$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }  
        - { path: ^/forgot, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password$, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password/, roles: PUBLIC_ACCESS }
        
        # Routes OAuth2 - PUBLIQUES pour permettre la connexion
        - { path: ^/connect/google$, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/check$, roles: PUBLIC_ACCESS }
        - { path: ^/google/select-role$, roles: PUBLIC_ACCESS }
        - { path: ^/google/confirm-role$, roles: PUBLIC_ACCESS }
        - { path: ^/oauth/authenticate$, roles: PUBLIC_ACCESS }
        
        # Pages protégées par rôle
        - { path: ^/admin/, roles: ROLE_ADMIN }
        - { path: ^/medecin/, roles: ROLE_MEDECIN }
        - { path: ^/patient/, roles: ROLE_PATIENT }
        - { path: ^/laboratoire/, roles: ROLE_PATIENT }
        - { path: ^/responsable-labo/, roles: ROLE_RESPONSABLE_LABO }
        - { path: ^/responsable/, roles: ROLE_RESPONSABLE_PARA }
        - { path: ^/laboratoire/, roles: ROLE_RESPONSABLE_LABO }
        - { path: ^/laboratoire/new$, roles: ROLE_RESPONSABLE_LABO }
        - { path: ^/parapharmacie/, roles: ROLE_RESPONSABLE_PARA }
        
        # Toutes les autres pages nécessitent une connexion
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }
