# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    report.sender: '%env(REPORT_SENDER)%'
    report.recipients: '%env(REPORT_RECIPIENTS)%'
    fraud.thresholds:
        max_requests_per_day: 10
        max_appointments_per_day: 5
        max_accounts_per_phone: 2
        max_cancellations_30d: 5
        max_cancel_rate_30d: 0.5
        min_appointments_for_cancel_rate: 5
        abnormal_hours_start: 0
        abnormal_hours_end: 6
        abnormal_hours_min_actions_30d: 3
    fraud.score_weights:
        shared_phone: 15
        high_daily_demands: 20
        high_daily_appointments: 15
        high_cancel_rate: 25
        abnormal_hours: 10
    prediction.config:
        since_days: 30
        churn_no_activity_boost: 60
        churn_days_weight: 40
        churn_days_cap: 90
        demand_score_per_request: 20
        cancel_min_count: 3
    app.fastapi_ai.endpoint: '%env(FASTAPI_AI_ENDPOINT)%'
    app.fastapi_ai.ocr_engine: '%env(FASTAPI_AI_OCR_ENGINE)%'
    app.fastapi_ai.lang: '%env(FASTAPI_AI_LANG)%'
    app.fastapi_ai.model: '%env(FASTAPI_AI_MODEL)%'
    app.fastapi_ai.use_ollama: '%env(bool:FASTAPI_AI_USE_OLLAMA)%'
    app.fastapi_ai.timeout: '%env(int:FASTAPI_AI_TIMEOUT)%'
    app.fastapi_ai.api_key: '%env(default::FASTAPI_AI_API_KEY)%'
    produits_images_directory: '%kernel.project_dir%/public/uploads/produits'


services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Security\RecaptchaVerifier:
        arguments:
            $secretKey: '%env(RECAPTCHA_SECRET_KEY)%'
            $enabled: '%env(bool:RECAPTCHA_ENABLED)%'

    App\Security\LoginFormAuthenticator:
        arguments:
            $recaptchaMinScore: '%env(float:RECAPTCHA_MIN_SCORE)%'

    App\Service\FraudDetectionService:
        arguments:
            $thresholds: '%fraud.thresholds%'
            $weights: '%fraud.score_weights%'

    App\Service\UserPredictionService:
        arguments:
            $config: '%prediction.config%'

    App\Command\MonthlyReportCommand:
        arguments:
            $reportSender: '%report.sender%'
            $reportRecipients: '%report.recipients%'
    App\Integration\FastApiLabAiClient:
        arguments:
            $endpoint: '%app.fastapi_ai.endpoint%'
            $ocrEngine: '%app.fastapi_ai.ocr_engine%'
            $lang: '%app.fastapi_ai.lang%'
            $model: '%app.fastapi_ai.model%'
            $useOllama: '%app.fastapi_ai.use_ollama%'
            $timeout: '%app.fastapi_ai.timeout%'
            $apiKey: '%app.fastapi_ai.api_key%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
